<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>docx → Moodle XML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #020202; color: #ffffff; }
    .dropzone {
      border: 2px dashed #6c8cff; border-radius: 16px; padding: 36px; text-align: center;
      background: #1a1a1a; transition: all .2s ease;
    }
    .dropzone.dragover { background: #9e9e9e; border-color: #91a7ff; }
    .card { background: #000000; border: 1px solid #ffffff; color:#ffffff }
    .badge-gab { font-size: .75rem; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .muted { color: #92a2b8; }
    .alt-grid { display: grid; grid-template-columns: 50px 1fr; gap: 8px; }
    .sticky-actions { position: sticky; top: 0; z-index: 20; background: #0f1115; padding: 12px 0; border-bottom: 1px solid #202532; }
  </style>
</head>
<body>
<div class="container py-4">
  <h1 class="mb-3">DOCX → Moodle XML</h1>
  <p class="muted mb-4">Arraste seu <strong>.docx</strong> aqui, visualize as questões, marque <span class="mono">{REMOVER}</span> e exporte o XML.</p>

  <div id="drop" class="dropzone mb-4">
    <h5 class="mb-2">Arraste e solte o DOCX aqui</h5>
    <p class="muted">ou clique para selecionar</p>
    <input id="fileInput" type="file" accept=".docx" hidden>
  </div>

  <div class="sticky-actions d-flex gap-2 align-items-center">
    <div><span class="muted">Documento:</span> <span id="docId" class="mono">—</span></div>
    <div class="ms-3"><span class="muted">Questões:</span> <span id="qCount" class="mono">0</span></div>
    <div class="ms-auto d-flex gap-2">
      <input class="form-control form-control-sm" id="categoria" placeholder="Categoria Moodle (opcional)" />
      <button id="btnExport" class="btn btn-primary btn-sm" disabled>Exportar XML</button>
    </div>
  </div>

  <div id="list" class="mt-3"></div>

  <div class="mt-4">
    <h5>Debug</h5>
    <pre id="log" class="mono" style="white-space:pre-wrap;background:#0b0d12;border:1px solid #202532;border-radius:10px;padding:12px;max-height:260px;overflow:auto"></pre>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
